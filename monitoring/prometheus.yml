global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    environment: production
    project:     orbithive

scrape_configs:

  - job_name: nestjs-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:3000"]
        labels:
          service: api
          language: nodejs

  - job_name: caddy
    metrics_path: /metrics
    static_configs:
      - targets: ["caddy:2019"]
        labels:
          service: caddy

  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus
